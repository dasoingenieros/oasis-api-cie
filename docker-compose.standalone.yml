# docker-compose.standalone.yml — Para venta (CIE standalone)
# Incluye todo: API + PostgreSQL + Valkey + LibreOffice

services:
  cie-api:
    build: .
    container_name: oasis-api-cie
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - postgres
      - valkey

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oasis_cie
      POSTGRES_USER: cie
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped

  # Opcional: si necesita LibreOffice para CIE Excel
  libreoffice:
    build:
      context: .
      dockerfile: Dockerfile.libreoffice
    restart: unless-stopped

volumes:
  pgdata:
